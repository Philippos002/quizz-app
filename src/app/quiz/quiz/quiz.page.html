<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>Quiz</ion-title>
    <ion-buttons slot="end">
      <ion-badge color="danger">⏱️ {{timeRemaining}}s</ion-badge>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="quiz-content">
  <div class="loading" *ngIf="isLoading">
    <ion-spinner></ion-spinner>
    <p>Loading question...</p>
  </div>

  <div class="quiz-container" *ngIf="!isLoading && question">
    <div class="question-section">
      <h2 class="question-text">{{question.questionText}}</h2>
    </div>

    <div class="score-section">
      <span>Correct answers: <strong>{{score}}</strong> / 5</span>
    </div>

    <div class="answers-section">
      <div class="answer-slot" *ngFor="let answer of slots; let i = index">
        <span class="slot-number">{{i + 1}}.</span>
        <span class="slot-content">{{answer || '-'}}</span>
      </div>
    </div>

    <div class="input-section">
      <label>Enter an answer (press ENTER):</label>
      <ion-input type="text" [(ngModel)] = "answerInput" (keypress) = "onKeyPress($event)" placeholder="Type here..." class="active-input" [disabled]="quizFinished"></ion-input>
    </div>
  </div>
</ion-content>
