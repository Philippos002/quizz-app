<ion-header>
  <ion-toolbar>
    <ion-title>Result</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="result-content">
  <div class="result-container">
    <div class="result-header">
      <h1>Quiz Complete!</h1>
    </div>

    <div class="score-display">
      <p class="score-label">Your score <strong>{{username}}</strong>:</p>
      <div class="score-box">
        <span class="score-value">{{score}}</span>
        <span class="score-max"> / 5</span>
      </div>
    </div>

    <div class="buttons-container">
      <ion-button expand="block" color="primary" (click) = "playAgain()">
        Play Again!
      </ion-button>

      <ion-button expand="block" color="secondary" (click) = "goToLeaderboard()">
        Leaderboard
      </ion-button>

      <ion-button expand="block" color="danger" (click) = "exit()">
        Exit
      </ion-button>
    </div>
  </div>
</ion-content>
