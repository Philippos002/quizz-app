<ion-header>
  <ion-toolbar>
    <ion-title>Quiz App</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="user-section">
    <ion-avatar class="avatar">
      <img src="https://ionicframework.com/docs/img/demos/avatar.svg">
    </ion-avatar>
    <h2 class="username">Username</h2>
  </div>

  <ion-card>
    <ion-card-header>
      <ion-card-title>Start Quiz</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      Test your knowledge!
      <ion-button expand="block" routerLink="/quiz">
        Start Quiz
      </ion-button>
    </ion-card-content>
  </ion-card>

  <ion-card>
    <ion-card-header>
      <ion-card-title>Leaderboard</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      See top players.
      <ion-button expand="block" routerLink="/leaderboard">
        Open Leaderboard
      </ion-button>
    </ion-card-content>
  </ion-card>
</ion-content>
