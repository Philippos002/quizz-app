<ion-header>
  <ion-toolbar>
    <ion-title>Login</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <form #loginForm = "ngForm" (ngSubmit)="onLogin(loginForm)">
    <div class="auth-container">
      <h2>Ready for new challenges?</h2>

      <div class="form-group">
        <ion-label>Email</ion-label>
        <ion-input type="email" ngModel name="email" required #email = "ngModel"></ion-input>
      </div>

      <div *ngIf="email?.invalid && email?.touched" class="error-message">
        Email is required.
      </div>

      <div class="form-group">
        <ion-label>Password</ion-label>
        <ion-input type="password" ngModel name="password" required #password = "ngModel"></ion-input>
      </div>

      <div *ngIf="password?.invalid && password?.touched" class="error-message">
        Password is required.
      </div>

      <ion-button expand="block" type="submit" [disabled]="loginForm.invalid" class="login-btn">
        Login
      </ion-button>

      <p class="auth-link">
        Don't have an account?
        <a routerLink="/register">Register</a>
      </p>
    </div>
  </form>
</ion-content>
