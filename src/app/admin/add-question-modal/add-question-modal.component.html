<ion-header>
  <ion-toolbar>
    <ion-title>Add Question</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="dismiss()">Close</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="modal-content">
  <div class="form-container">
    <div class="form-group">
      <label>Question Text</label>
      <ion-textarea
        [(ngModel)]="questionText"
        placeholder="Enter question..."
        rows="4">
      </ion-textarea>
    </div>

    <div class="form-group">
      <label>Answers</label>

      <div class="answer-input">
        <span class="answer-label">1.</span>
        <ion-input
          [(ngModel)]="answer1"
          type="text"
          placeholder="Answer 1">
        </ion-input>
      </div>

      <div class="answer-input">
        <span class="answer-label">2.</span>
        <ion-input
          [(ngModel)]="answer2"
          type="text"
          placeholder="Answer 2">
        </ion-input>
      </div>

      <div class="answer-input">
        <span class="answer-label">3.</span>
        <ion-input
          [(ngModel)]="answer3"
          type="text"
          placeholder="Answer 3">
        </ion-input>
      </div>

      <div class="answer-input">
        <span class="answer-label">4.</span>
        <ion-input
          [(ngModel)]="answer4"
          type="text"
          placeholder="Answer 4">
        </ion-input>
      </div>

      <div class="answer-input">
        <span class="answer-label">5.</span>
        <ion-input
          [(ngModel)]="answer5"
          type="text"
          placeholder="Answer 5">
        </ion-input>
      </div>
    </div>

    <div class="button-group">
      <ion-button expand="block" color="secondary" (click)="dismiss()">
        Cancel
      </ion-button>
      <ion-button expand="block" color="primary" (click)="save()">
        Save Question
      </ion-button>
    </div>
  </div>
</ion-content>
