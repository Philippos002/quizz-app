<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Admin</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="admin-content">
  <div class="admin-container">

    <div class="add-section">
      <ion-button expand="block" color="primary" (click) = "openAddQuestionModal()"> + Add Question </ion-button>
    </div>

    <div class="loading" *ngIf="isLoading">
      <ion-spinner></ion-spinner>
      <p>Loading questions...</p>
    </div>

    <div class="questions-list" *ngIf="!isLoading">
      <h2>All Questions</h2>

      <div class="question-item" *ngFor="let question of questions$ | async">
        <div class="question-info">
          <p class="question-text">{{question.questionText}}</p>
          <p class="question-meta">Answers: {{question.answers.length}}</p>
        </div>
        <div class="question-actions">
          <ion-button size="small" fill="clear" color="primary" (click) = "onEditQuestion(question)">Edit</ion-button>
          <ion-button size="small" fill="clear" color="danger" (click) = "onDeleteQuestion(question.id, question.questionText)">Delete</ion-button>
        </div>
      </div>

      <div class="empty-state" *ngIf="(questions$ | async)?.length === 0">
        <p>No questions yet. Add some!</p>
      </div>
    </div>
  </div>
</ion-content>
